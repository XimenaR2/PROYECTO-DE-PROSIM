<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Photo / Video Editor</title>

  <link rel="stylesheet" href="../CSS/header.css">
  <link rel="stylesheet" href="../CSS/filtros.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    @keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
    @keyframes slideUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
  </style>
</head>
<body>

  <header class="header-outer">
    <div class="header-inner responsive-wrapper">
      <div class="header-logo">
        <img src="../MULTIMEDIA/quiz1.jpg" alt="">
        <h2>VE EL VAR</h2>
      </div>
      <nav class="header-navigation">
        <a href="home.html"><i class="fas fa-qrcode"></i><span>Escáner</span></a>
        <a href="quiz.html"><i class="fas fa-gamepad"></i><span>Quiz</span></a>
        <a href="estadisticas.html"><i class="fas fa-chart-bar"></i><span>Estadísticas</span></a>
        <a href="filtros.html"><i class="fas fa-video"></i><span>Edición</span></a>
      </nav>
    </div>
  </header>

  <main class="editor-page">
    <h1>Editor Multimedia</h1>
    <p class="subtitle">Edita imágenes y videos desde tu navegador</p>

    <section class="editor-card">

      <!-- LEFT: TOOLS -->
      <aside class="tools-panel">
        <button data-tool="crop">
          <i class="fas fa-crop-alt"></i>
          <span>Recortar</span>
        </button>
        <button data-tool="rotate">
          <i class="fas fa-redo"></i>
          <span>Rotar</span>
        </button>
        <button data-tool="text">
          <i class="fas fa-font"></i>
          <span>Texto</span>
        </button>
        <button data-tool="filters">
          <i class="fas fa-magic"></i>
          <span>Filtros</span>
        </button>
        <button data-tool="adjust">
          <i class="fas fa-sliders-h"></i>S
          <span>Ajustar</span>
        </button>
      </aside>

      <!-- CENTER: PREVIEW -->
      <div class="preview-panel" id="previewPanel">
        <div class="preview-placeholder">
          <i class="fas fa-film"></i>
          <p>Importa un video para comenzar</p>
        </div>
      </div>

      <!-- RIGHT: ACTIONS -->
      <aside class="actions-panel">
        <button class="primary" id="btnAplicar">
          <i class="fas fa-check"></i> Aplicar
        </button>
        <button id="btnDeshacer">
          <i class="fas fa-undo"></i> Deshacer
        </button>
        <button id="btnExportar">
          <i class="fas fa-download"></i> Exportar
        </button>
        <button id="btnImportar">
          <i class="fas fa-upload"></i> Importar
        </button>
        <button class="library-btn" id="btnLibreria">
          <i class="fas fa-photo-film"></i> Biblioteca
        </button>
        <input type="file" id="fileInput" accept="video/*" hidden>
      </aside>

    </section>
  </main>

  <script src="../JS/filtros.js"></script>
</body>
</html>
