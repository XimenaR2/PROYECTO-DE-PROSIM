<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Photo / Video Editor</title>

  <!-- CONNECT CSS -->
  <link rel="stylesheet" href="../CSS/header.css">
  <link rel="stylesheet" href="../CSS/filtros.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

 <header class="header-outer"><!-- header-->
        <div class="header-inner responsive-wrapper">
            <div class="header-logo">
            <img src="../MULTIMEDIA/quiz1.jpg" alt="" >
            <h2>VE EL VAR</h2>
        </div>
             <nav class="header-navigation">
                <a href="home.html">
                    <i class="fas fa-qrcode"></i>
                    <span>Escáner</span>
                </a>

                <a href="quiz.html">
                    <i class="fas fa-gamepad"></i>
                    <span>Quiz</span>
                </a>

                <a href="estadisticas.html">
                    <i class="fas fa-chart-bar"></i>
                    <span>Estadísticas</span>
                </a>

                <a href="filtros.html">
                    <i class="fas fa-video"></i>
                    <span>Edición</span>
                </a>
            </nav>
        </div>
    </header>
    
  <!-- EDITOR SECTION -->
  <main class="editor-page">

    <h1>Editor Multimedia</h1>
    <p class="subtitle">Edita imágenes y videos desde tu navegador</p>

    <!-- EDITOR CARD -->
    <section class="editor-card">

      <!-- TOOLS -->
      <aside class="tools-panel">
        <button>Crop</button>
        <button>Rotate</button>
        <button>Text</button>
        <button>Filters</button>
        <button>Adjust</button>
      </aside>

      <!-- PREVIEW -->
      <div class="preview-panel" id="previewPanel">
        Vista previa de imagen / video
      </div>

      <!-- ACTIONS -->
      <aside class="actions-panel">
        <button class="primary">Aplicar</button>
        <button>Deshacer</button>
        <button>Exportar</button>
        <button id="btnImportar">Importar</button>
        <input type="file" id="fileInput" accept="video/*" hidden>
        </aside>

    </section>

  </main>

<script src="../JS/filtros.js"></script>
</body>
</html>
